<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="./src/style.css">
</head>

<body>

  <h1>Tic tac toe</h1>
  <div class="status" id="status">
    <p>Tour du joueur</p>
    <p id="turn"></p>
  </div>

  <div id="message"></div>

  <div class="gameContainer">
    <div class="row">
      <div class="cell" id="0"></div>
      <div class="cell" id="1"></div>
      <div class="cell" id="2"></div>
    </div>
    <div class="row">
      <div class="cell" id="3"></div>
      <div class="cell" id="4"></div>
      <div class="cell" id="5"></div>
    </div>
    <div class="row">
      <div class="cell" id="6"></div>
      <div class="cell" id="7"></div>
      <div class="cell" id="8"></div>
    </div>
  </div>

  <button id="settings">Parametres</button>
  <button id="reset">Recommencer</button>

  <div class="menu">
    <h2>Jouer contre</h2>
    <div class="playAgainst">
      <div>
        <input type="radio" name="opponent" id="human" value="human" checked>
        <label for="human">Homme</label>
      </div>
      <div>
        <input type="radio" name="opponent" id="ai" value="ai">
        <label for="ai">IA</label>
      </div>
    </div>
    <button class="button" id="startGame">Commencer</button>
  </div>
  <script src="./src/main.js"></script>
</body>

</html>
